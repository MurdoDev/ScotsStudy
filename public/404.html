<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 • StudyScot</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #021427;
    --panel: #083b73;
    --panel-light: #0d57a3;
    --primary: #0072ce;
    --primary-hover: #2890e8;
    --text: #f8fbff;
    --muted: #a9c2de;
    --border: rgba(255,255,255,0.10);
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background:
        radial-gradient(circle at top, #0d57a3 0%, transparent 45%),
        var(--bg);

    font-family: 'Inter', sans-serif;
    color: var(--text);
}

.error-card {
    width: min(560px, 100%);
    background: rgba(8, 59, 115, 0.92);
    backdrop-filter: blur(14px);

    border: 1px solid var(--border);
    border-radius: 32px;

    padding: 42px;
    text-align: center;

    box-shadow:
        0 20px 50px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.04);
}

.logo {
    width: 110px;
    margin-bottom: 26px;
}

.error-code {
    font-size: 82px;
    font-weight: 900;
    line-height: 1;
    margin: 0;
    background: linear-gradient(135deg, #ffffff, #7ec7ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.error-title {
    font-size: 30px;
    font-weight: 800;
    margin: 14px 0 10px;
}

.error-text {
    color: var(--muted);
    font-size: 16px;
    line-height: 1.7;
    margin-bottom: 30px;
}

.button-row {
    display: flex;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
}

.primary-btn,
.secondary-btn {
    padding: 14px 24px;
    border-radius: 999px;
    font-weight: 800;
    font-size: 15px;
    text-decoration: none;
    transition: 0.2s ease;
}

.primary-btn {
    background: var(--primary);
    color: white;
    border: none;
}

.primary-btn:hover {
    background: var(--primary-hover);
    transform: translateY(-2px);
}

.secondary-btn {
    background: rgba(255,255,255,0.05);
    color: var(--text);
    border: 1px solid var(--border);
}

.secondary-btn:hover {
    background: rgba(255,255,255,0.08);
    transform: translateY(-2px);
}

.footer {
    margin-top: 28px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
}

@media (max-width: 600px) {
    .error-card {
        padding: 32px 24px;
        border-radius: 26px;
    }

    .error-code {
        font-size: 62px;
    }

    .error-title {
        font-size: 24px;
    }

    .error-text {
        font-size: 15px;
    }

    .button-row {
        flex-direction: column;
    }

    .primary-btn,
    .secondary-btn {
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="error-card">

    <img
        class="logo"
        src="https://raw.githubusercontent.com/MurdoDev/ScotsStudy/main/myappassets/logo.png"
        alt="StudyScot Logo"
    >

    <div class="error-code">404</div>

    <div class="error-title">
        Page Not Found
    </div>

    <div class="error-text">
        The page you're looking for doesn't exist,
        may have been moved, or is still being revised.
    </div>

    <div class="button-row">
        <a href="/" class="primary-btn">
            Return Home
        </a>

        <a href="javascript:history.back()" class="secondary-btn">
            Go Back
        </a>
    </div>

    <div class="footer">
        © 2026 StudyScot • Murdo Macleod
    </div>

</div>

</body>
</html>
